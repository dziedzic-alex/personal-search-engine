name: CI

on: [push]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install Node dependencies
        run: npm install

      - name: Prettier format check
        run: npx prettier --check .

      - name: Run lint
        run: npm run lint

      - name: Build bundle
        run: npm run build
