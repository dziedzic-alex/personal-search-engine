services:
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    command: fastapi dev api/main.py --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/backend
      - uploads:/backend/uploads
    depends_on:
      - redis

  worker:
    build: .
    command: python -m workers.main
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/backend
      - uploads:/backend/uploads
    depends_on:
      - redis

volumes:
  redis_data:
  uploads:
