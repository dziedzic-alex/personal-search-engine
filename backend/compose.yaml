services:
  db:
    image: pgvector/pgvector:pg18-trixie
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vector_db
    volumes:
      - db_data:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    command: fastapi dev api/main.py --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vector_db
    volumes:
      - .:/backend
      - uploads:/backend/uploads
    depends_on:
      - redis
      - db

  worker:
    build: .
    command: python -m workers.main
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vector_db
    volumes:
      - .:/backend
      - uploads:/backend/uploads
    depends_on:
      - redis
      - db
    develop:
      watch:
        - path: ./workers
          action: restart

        - path: ./shared
          action: restart

volumes:
  redis_data:
  uploads:
  db_data:
